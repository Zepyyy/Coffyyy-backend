info:
  name: Create machine
  type: http
  seq: 3

http:
  method: post
  url: "{{BaseUrl}}/api/machine"
  headers:
    - name: accept
      value: "*/*"
    - name: Content-Type
      value: application/json
    - name: X-CSRF-TOKEN
      value: "{{CSRF-TOKEN}}"
  body:
    type: json
    data: |-
      {
        "name": "qs",
        "brand": "qsd",
        "type": "aze",
        "purchaseDate": "2026-06-22T16:24:23.081Z",
        "model": "qsd",
        "grindRange": "qsd",
        "capacity": "qsd"
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
