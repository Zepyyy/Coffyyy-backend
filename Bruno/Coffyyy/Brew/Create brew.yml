info:
  name: Create brew
  type: http
  seq: 3

http:
  method: post
  url: http://localhost:3000/api/brew
  headers:
    - name: accept
      value: "*/*"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "beanWeight": 0,
        "espressoWeight": 0,
        "extractionTime": "string",
        "flow": "string",
        "overallRating": 0,
        "tasteScore": 0,
        "strengthScore": 0,
        "grindSize": 0,
        "date": "2026-06-22T16:20:58.535Z",
        "beanId": 2,
        "machineId": 3
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
